syntax = "proto3";

package protocol;

option go_package = "github.com/taylor-zha/lockstep/pkg/protocol";

// 客户端 -> 服务器 消息
message ClientMessage {
  oneof payload {
    LoginRequest login = 1;
    JoinRoomRequest join_room = 2;
    PlayerInput input = 3;
    Heartbeat heartbeat = 4;
  }
}

// 服务器 -> 客户端 消息
message ServerMessage {
  oneof payload {
    LoginResponse login = 1;
    JoinRoomResponse join_room = 2;
    FrameData frame = 3;
    RoomState room_state = 4;
    ErrorResponse error = 5;
    Heartbeat heartbeat = 6;
  }
}

// 登录请求
message LoginRequest {
  string player_id = 1;
  string token = 2;
}

// 登录响应
message LoginResponse {
  bool success = 1;
  string session_id = 2;
  string message = 3;
}

// 加入房间请求
message JoinRoomRequest {
  string room_id = 1;
  // 空则创建新房间
}

// 加入房间响应
message JoinRoomResponse {
  bool success = 1;
  string room_id = 2;
  int32 player_index = 3;
  repeated PlayerInfo players = 4;
}

// 玩家信息
message PlayerInfo {
  string player_id = 1;
  int32 index = 2;
  bool ready = 3;
}

// 玩家输入
message PlayerInput {
  uint32 frame = 1;
  int32 player_index = 2;
  bytes input_data = 3;
}

// 帧数据 (广播给所有玩家)
message FrameData {
  uint32 frame = 1;
  repeated PlayerInput inputs = 2;
}

// 房间状态
message RoomState {
  enum State {
    WAITING = 0;
    PLAYING = 1;
    FINISHED = 2;
  }
  State state = 1;
  uint32 current_frame = 2;
}

// 心跳
message Heartbeat {
  int64 timestamp = 1;
}

// 错误响应
message ErrorResponse {
  int32 code = 1;
  string message = 2;
}
